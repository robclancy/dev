color_green: &color_green
  foreground: "A6E3A1FF"

color_red: &color_red
  foreground: "F38BA8FF"

color_yellow: &color_yellow
  foreground: "E0AF68FF"

anchors:
  separator: &separator
    label:
      content: {string: {text: " "}}

bat: &bat
  list:
    spacing: 0
    items:
      - map:
          conditions:
            "(state == \"not charging\") && (capacity < 10)":
              string:
                text: "*"
                <<: *color_red
            "(state == charging) || (state == \"not charging\") || (state == full)":
              ramp:
                tag: capacity
                items:
                  - string: { text: " ", <<: *color_red }
                  - string: { text: " ", <<: *color_red }
                  - string: { text: " ", <<: *color_green }
                  - string: { text: " ", <<: *color_green }
                  - string: { text: " ", <<: *color_green }
          default:
            ramp:
              tag: capacity
              items:
                - string: { text: " ", <<: *color_red }
                - string: { text: " ", <<: *color_red }
                - string: { text: " ", <<: *color_yellow }
                - string: { text: " ", <<: *color_yellow }
                - string: { text: " ", <<: *color_yellow }
      - string:
          text: "{capacity}% "

bar:
  height: 30
  location: top
  background: 000000ff
  font: MonaspaceKrypton:pixelsize=24
  spacing: 3
  margin: 5

  left:
    - cpu:
        poll-interval: 1111
        content:
          map:
            default: {empty: {}}
            conditions:
              id < 0:
                list:
                  items:
                    - string: {text: "CPU "}
                    - map:
                        default: {string: {text: "{cpu}%"}}
                        conditions:
                          cpu > 70:
                            string:
                              text: "{cpu}%"
                              <<: *color_yellow

    - script:
        path: '~/.config/yambar/cpu_temp.sh'
        poll-interval: 1111
        content:
          map:
            default: {string: {text: "{temp}°C"}}
            conditions:
              temp > 85:
                string:
                  text: "{temp}°C"
                  <<: *color_red
              temp > 70:
                string:
                  text: "{temp}°C"
                  <<: *color_yellow
    - *separator
    - mem:
        poll-interval: 2222
        content:
          list:
            items:
              - string: {text: "MEM "}
              - map:
                  default: {string: {text: "{percent_used}%"}}
                  conditions:
                    percent_used > 80:
                      string:
                        text: '{percent_used}%'
                        <<: *color_red
    - *separator
    - disk-io:
        poll-interval: 2222
        content:
          map:
            conditions:
              device == Total:
                list:
                  items:
                    - string: {text: "IO {read_speed:mib}/{write_speed:mib} MB/s"}
    - *separator
    - network:
        content:
          map:
            default: {empty: {}}
            conditions:
              name == enp6s0:
                map:
                  conditions:
                    ~carrier: {empty: {}}
                    carrier:
                      map:
                        default: {string: {text: "not connected", foreground: ff0000ff }}
                        conditions:
                          state == up && ipv4 != "": {string: {text: connected}}
    - network:
        poll-interval: 2222
        content:
          map:
            default: {empty: {}}
            conditions:
              name == wlp5s0:
                map:
                  conditions:
                    state == down: {string: {text: "not connected", foreground: ff0000ff}}
                    state == up:
                      map:
                        default:
                          - string: {text: "{ssid} {dl-speed:mb}/{ul-speed:mb} Mb/s"}
                        conditions:
                          ipv4 == "":
                            - string: {text: "{ssid} {dl-speed:mb}/{ul-speed:mb} Mb/s", foreground: ffffff66}
    - battery:
        name: BAT0
        poll-interval: 30000
        content: *bat
    - battery:
        name: BAT1
        poll-interval: 30000
        content: *bat
  center:
    - script:
        path: '~/.config/yambar/workspaces.sh'
        poll-interval: 666
        content:
          string: {text: "{workspaces}"}
  right:
    - pipewire:
        content:
          map:
            conditions:
              type == "sink":
                list:
                  spacing: 5
                  items:
                    - map:
                        default:
                          string:
                            text: "VOL {cubic_volume}%"
                            on-click:
                              left: "pactl set-sink-mute @DEFAULT_SINK@ toggle"
                              wheel-up: "pactl set-sink-volume @DEFAULT_SINK@ +1%"
                              wheel-down: "pactl set-sink-volume @DEFAULT_SINK@ -1%"
                        conditions:
                          muted:
                            string:
                              text: "VOL [MUTED]"
                              on-click:
                                left: "pactl set-sink-mute @DEFAULT_SINK@ toggle"
                                wheel-up: "pactl set-sink-mute @DEFAULT_SINK@ toggle"
                    - string:
                        text: "{description}"
                        on-click: "pavucontrol-qt"
    - *separator
    - clock:
        date-format: "%d %b"
        time-format: "%H:%M %Z"
        content:
          - string: {text: "{date}, {time}"}
